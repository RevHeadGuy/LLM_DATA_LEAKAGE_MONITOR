<!DOCTYPE html>
<html>
<head>
  <title>Sensitive Data Blocker</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .status {
      padding: 10px;
      border-radius: 4px;
      background-color: #f0f0f0;
    }
    .active {
      background-color: #e6ffe6;
      color: #006600;
    }
    .inactive {
      background-color: #ffe6e6;
      color: #660000;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Sensitive Data Blocker</h2>
    <div id="status" class="status active">
      Protection: Active
    </div>
    <button id="toggleProtection">Disable Protection</button>
    <div id="stats">
      <p>Detected sensitive data: <span id="detectionCount">0</span></p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
